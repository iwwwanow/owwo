# TODO /var/www/web dirs
version: '3.8'

services:
  nginx:
    build:
      network: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:8080"
    depends_on:
      - fcgi
    networks:
      - web-network

  fcgi:
    build:
      network: host
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/web
      - ./data:/data
    ports:
      - "9000:9000"
      - "8082:8082"
    networks:
      - web-network

networks:
  web-network:
    driver: bridge
